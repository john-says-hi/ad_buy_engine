services:

  campaign_db:
    image: postgres:13.2-alpine
    container_name: campaign_server_storage
    volumes:
      - type: volume
        source: campaign_db_data
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  redis:
    image: redis:latest
    restart: always

  campaign_server:
    depends_on:
      - redis
      - campaign_db
    build: .
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=80
      - PORT_SECURE=443
      - REDIS_URL=redis:6379
      - POSTGRES_DB_HOST=campaign_db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - API_KEY=${API_KEY}
    ports:
      - "${PORT}:80"
      - "${PORT_SECURE}:443"
    restart: always
    volumes:
      - type: bind
        source: ${TLS_FULLCHAIN_PATH:-./fullchain.pem}
        target: /app/fullchain.pem
      - type: bind
        source: ${TLS_PRIVKEY_PATH:-./privkey.pem}
        target: /app/privkey.pem
      - type: bind
        source: ./static
        target: /app/static
      - type: bind
        source: ./migrations
        target: /app/migrations

volumes:
  campaign_db_data:
    name: campaign_server_storage
    external: true
